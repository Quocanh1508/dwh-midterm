name: CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      chaos_mode:
        description: 'Simulate a Pipeline Failure (Chaos Mode)'
        required: true
        type: choice
        default: 'none'
        options:
          - 'none'
          - 'status'
          - 'quantity'
          - 'orphan'
          - 'location'

jobs:
  deploy:
    name: Full Pipeline Run (Refresh Data & Models)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "❌ ERROR: GCP_SA_KEY secret is empty or missing! Please add it to GitHub Settings -> Secrets -> Actions."
            exit 1
          fi
          python -c "
          import os, json, sys
          key = os.environ.get('GCP_SA_KEY', '')
          try:
              json.loads(key)
          except Exception as e:
              print('❌ ERROR: GCP_SA_KEY secret on GitHub is NOT valid JSON! You likely pasted an empty line or malformed text.')
              print(f'JSON Error: {e}')
              sys.exit(1)
          with open('/tmp/gcp_key.json', 'w') as f:
              f.write(key)
          "
        
      - name: Generate .env file
        run: |
          echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" > .env
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_key.json" >> .env
          echo "BQ_LOCATION=US" >> .env
          echo "BQ_DATASET_RAW=retail_raw" >> .env
          echo "BQ_DATASET_STAGING=retail_staging" >> .env
          echo "BQ_DATASET_MARTS=retail_marts" >> .env

      - name: Setup BigQuery Datasets
        run: python scripts/setup_bq.py

      - name: Seed Raw Data
        # We limit seeding in CI to 50k rows per table to keep pipeline fast, 
        # or use 0 for full data if you want the CD to maintain the full 400k rows.
        run: python scripts/seed_data.py --limit 0

      - name: Inject Dirty Data (Chaos Mode)
        if: ${{ github.event.inputs.chaos_mode != 'none' }}
        run: python scripts/chaos_injector.py --mode ${{ github.event.inputs.chaos_mode }}

      - name: dbt run (Deploy Views/Tables)
        run: python scripts/run_dbt.py run

      - name: dbt test (Verify Built Tables)
        run: python scripts/run_dbt.py test

      - name: Generate Expectation Suites
        run: python scripts/generate_expectations.py

      - name: Great Expectations Validation (Raw & Marts)
        run: |
          python scripts/run_ge.py raw_checkpoint
          python scripts/run_ge.py mart_checkpoint

      - name: Performance Tests (BigQuery EXPLAIN Cost check)
        run: python performance/explain_runner.py

      - name: Alert on Success
        if: success()
        run: |
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}" >> .env
          python scripts/alert_webhook.py success "🚀 Main Depoyment Complete! Data refreshed, models built, tests passed."

      - name: Alert on Failure
        if: failure()
        run: |
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}" >> .env
          python scripts/alert_webhook.py failure "🚨 CD Pipeline Failed to deploy to BigQuery. Check logs."
