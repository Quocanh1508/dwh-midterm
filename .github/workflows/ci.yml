name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate dbt models and Great Expectations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          python -c "import os; f=open('/tmp/gcp_key.json', 'w'); f.write(os.environ['GCP_SA_KEY']); f.close()"
        
      - name: Generate .env file
        run: |
          echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" > .env
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_key.json" >> .env
          echo "BQ_LOCATION=US" >> .env
          echo "BQ_DATASET_RAW=retail_raw" >> .env
          echo "BQ_DATASET_STAGING=retail_staging" >> .env
          echo "BQ_DATASET_MARTS=retail_marts" >> .env

      - name: dbt compile (Validate syntax)
        run: python scripts/run_dbt.py compile

      - name: dbt test (Validate constraints on current data)
        run: python scripts/run_dbt.py test

      - name: Great Expectations (Raw Data)
        run: python scripts/run_ge.py raw_checkpoint

      - name: Great Expectations (Marts Data)
        run: python scripts/run_ge.py mart_checkpoint

      - name: Performance Tests (BigQuery EXPLAIN Cost check)
        run: python performance/explain_runner.py

      - name: Alert on Success
        if: success()
        run: |
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}" >> .env
          python scripts/alert_webhook.py success "✅ PR Validation Passed: dbt & GE tests are green!"

      - name: Alert on Failure
        if: failure()
        run: |
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}" >> .env
          python scripts/alert_webhook.py failure "❌ PR Validation Failed: Check GitHub Actions logs."
